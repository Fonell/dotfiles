"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$line_break\
$character"""

right_format = "$cmd_duration"

[username]
show_always = false

[hostname]
ssh_only = true

[directory]
style = "blue"
truncation_length = 3
truncate_to_repo = true

[character]
success_symbol = "[❯](blue)"
error_symbol = "[❯](red)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[ ($conflicted$untracked$modified$staged$renamed$deleted)](white) ($ahead_behind)]($style)"
style = "white"
conflicted = "󰕚 "
untracked = "? "
modified = "! "
staged = "+ "
renamed = "» "
deleted = "✘ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style)"
style = "yellow"

[nodejs]
format = "[$symbol($version)]($style) "
symbol = " "

[python]
format = "[$symbol($version)]($style) "
symbol = " "
